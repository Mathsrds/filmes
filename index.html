<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>STREAMZONE</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
}

body {
  background-color: #141414;
  color: #fff;
}

/* HEADER */
.header {
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
  padding: 20px 40px;
  position: fixed;
  width: 100%;
  z-index: 999;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: #E50914;
  font-size: 2rem;
  font-weight: bold;
}

.nav-links {
  display: flex;
  gap: 20px;
}

/* HERO */
.hero {
  height: 80vh;
  display: flex;
  align-items: center;
  padding: 0 40px;
  background: url('https://assets.nflxext.com/ffe/siteui/vlv3/6e32b96a-d4be-4e44-a19b-1bd2d2279b51/ee068656-14b9-4821-89b4-53b4937d9f1c/BR-pt-20220516-popsignuptwoweeks-perspective_alpha_website_small.jpg') center/cover;
}

.hero h1 {
  font-size: 3rem;
}

/* ROWS */
.rows {
  padding: 40px;
}

.row {
  margin-bottom: 40px;
  position: relative;
}

.row-title {
  margin-bottom: 15px;
}

/* 🔥 CARROSSEL CORRIGIDO */
.movie-grid {
  display: flex;
  flex-wrap: nowrap; /* NÃO QUEBRA LINHA */
  overflow-x: auto;
  gap: 15px;
  scroll-behavior: smooth;
}

.movie-grid::-webkit-scrollbar {
  display: none;
}

/* CARD */
.movie-card {
  flex: 0 0 250px; /* TAMANHO FIXO */
  transition: transform 0.3s;
  cursor: pointer;
}

.movie-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 5px;
}

.movie-card:hover {
  transform: scale(1.1);
}

/* INFO */
.movie-info {
  margin-top: 5px;
}

/* BOTÕES */
.scroll-button {
  position: absolute;
  top: 40%;
  width: 40px;
  height: 40px;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  cursor: pointer;
  z-index: 2;
}

.scroll-left { left: 0; }
.scroll-right { right: 0; }

</style>
</head>

<body>

<header class="header">
  <div class="nav">
    <div class="logo">STREAMZONE</div>
    <div class="nav-links">
      <span>Início</span>
      <span>Séries</span>
      <span>Filmes</span>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Filmes, séries e muito mais.</h1>
</section>

<section class="rows">

  <!-- EM ALTA -->
  <div class="row">
    <h2 class="row-title">🔥 Em alta</h2>

    <button class="scroll-button scroll-left">←</button>
    <button class="scroll-button scroll-right">→</button>

    <div class="movie-grid">

      <div class="movie-card">
        <img src="https://raw.githubusercontent.com/Mathsrds/filmes/refs/heads/main/81NXSwvq5JL._AC_UF1000%2C1000_QL80_.jpg">
        <div class="movie-info">One Punch Man</div>
      </div>

      <div class="movie-card">
        <a href="bokunohero.html">
          <img src="https://raw.githubusercontent.com/Mathsrds/filmes/refs/heads/main/my-hero-academia_f9ae.jpg">
        </a>
        <div class="movie-info">Boku no Hero</div>
      </div>

      <div class="movie-card">
        <img src="https://raw.githubusercontent.com/Mathsrds/filmes/refs/heads/main/big-poster-filme-anime-demon-slayer-mugen-train-90x60-cm-poster.webp">
        <div class="movie-info">Demon Slayer</div>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0">
        <div class="movie-info">La Casa de Papel</div>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0">
        <div class="movie-info">The Crown</div>
      </div>

    </div>
  </div>

  <!-- CONTINUAR -->
  <div class="row">
    <h2 class="row-title">▶ Continuar assistindo</h2>

    <button class="scroll-button scroll-left">←</button>
    <button class="scroll-button scroll-right">→</button>

    <div class="movie-grid">

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0">
        <div class="movie-info">Black Mirror</div>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0">
        <div class="movie-info">Umbrella Academy</div>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0">
        <div class="movie-info">Dark</div>
      </div>

      <div class="movie-card">
        <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0">
        <div class="movie-info">Narcos</div>
      </div>

    </div>
  </div>

</section>

<script>
document.querySelectorAll('.row').forEach(row => {
  const grid = row.querySelector('.movie-grid');

  row.querySelector('.scroll-left').onclick = () => {
    grid.scrollBy({ left: -300, behavior: 'smooth' });
  };

  row.querySelector('.scroll-right').onclick = () => {
    grid.scrollBy({ left: 300, behavior: 'smooth' });
  };
});
</script>

</body>
</html>
