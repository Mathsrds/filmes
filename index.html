<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>STREAMZONE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background-color: #141414;
  color: #fff;
}

.header {
  padding: 20px 40px;
  background: #000;
}

.logo {
  color: red;
  font-size: 2rem;
  text-decoration: none;
}

.rows {
  padding: 40px;
}

.row-title {
  font-size: 1.5rem;
  margin-bottom: 20px;
}

/* 🔥 AQUI ESTÁ A CORREÇÃO */
.movie-grid {
  display: flex;
  gap: 15px;
  overflow-x: auto;
  scroll-behavior: smooth;
}

.movie-grid::-webkit-scrollbar {
  display: none;
}

.movie-card {
  flex: 0 0 auto; /* ESSENCIAL */
  width: 200px;
  transition: transform 0.3s;
}

.movie-card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 5px;
}

.movie-card:hover {
  transform: scale(1.1);
}

.movie-info {
  margin-top: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<header class="header">
  <a class="logo">STREAMZONE</a>
</header>

<section class="rows">

  <h2 class="row-title">🎌 Animes</h2>

  <div class="movie-grid">

    <div class="movie-card">
      <a href="onepunch.html">
        <img src="https://raw.githubusercontent.com/Mathsrds/filmes/refs/heads/main/81NXSwvq5JL._AC_UF1000%2C1000_QL80_.jpg">
      </a>
      <div class="movie-info">One Punch Man</div>
    </div>

    <div class="movie-card">
      <a href="bokunohero.html">
        <img src="https://raw.githubusercontent.com/Mathsrds/filmes/refs/heads/main/my-hero-academia_f9ae.jpg">
      </a>
      <div class="movie-info">Boku no Hero</div>
    </div>

    <div class="movie-card">
      <a href="demonslayer.html">
        <img src="https://raw.githubusercontent.com/Mathsrds/filmes/refs/heads/main/big-poster-filme-anime-demon-slayer-mugen-train-90x60-cm-poster.webp">
      </a>
      <div class="movie-info">Demon Slayer</div>
    </div>

  </div>

</section>

</body>
</html>
